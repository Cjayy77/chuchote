name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # The test suite is pure-logic (no audio/model deps), so skip the heavy
      # runtime dependencies: install the package alone plus what tests need.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . --no-deps
          pip install numpy pytest "tomli; python_version < '3.11'"
      - name: Test
        run: pytest -q
