name: Publish to PyPI

# Publishes when a GitHub release is published. Uses PyPI "trusted publishing"
# (OIDC) — no API token needed, but the repo must be registered as a trusted
# publisher on pypi.org first (see README "Releasing").
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # PyPI version numbers are single-use: re-releasing without bumping the
      # version fails with "File already exists". Catch that before building.
      - name: Check release tag matches package version
        run: |
          PKG=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' does not match pyproject.toml version '$PKG'. Bump the version (pyproject.toml + chuchote/__init__.py), push, then create the release with a matching tag."
            exit 1
          fi
      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
